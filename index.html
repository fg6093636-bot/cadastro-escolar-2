<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão 04 - Cadastro</title>
    <link rel="stylesheet" href="style_cadastro.css">
</head>
<body>

    <div class="container-principal">
        <h1>Formulário de Cadastro</h1>
        
        <form action="#">
            
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required><br>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="0"><br>

            <label for="nascimento">Data de Nascimento:</label>
            <input type="date" id="nascimento" name="nascimento"><br>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required><br>

            <fieldset>
                <legend>Seus Hobbies:</legend>
                <label><input type="checkbox" name="hobby" value="games"> Jogar (Brawl/eFootball)</label><br>
                <label><input type="checkbox" name="hobby" value="futebol"> Assistir Futebol</label><br>
                <label><input type="checkbox" name="hobby" value="filmes"> Ver Séries e Filmes</label><br>
            </fieldset>

            <fieldset>
                <legend>Turno de Estudo:</legend>
                <label><input type="radio" name="turno" value="manha"> Manhã</label>
                <label><input type="radio" name="turno" value="tarde"> Tarde</label>
                <label><input type="radio" name="turno" value="noite"> Noite</label>
            </fieldset>

            <div class="botoes">
                <button type="submit" class="btn-enviar">Enviar Dados</button>
                <button type="reset" class="btn-limpar">Limpar Tudo</button>
            </div>

        </form>
    </div>

</body>
</html>
